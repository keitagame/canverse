<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canverse</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ui-bg: rgba(255,255,255,0.93);
    --ui-border: rgba(0,0,0,0.07);
    --ui-shadow: 0 2px 16px rgba(0,0,0,0.09);
    --font: 'DM Mono', 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: var(--font);
    cursor: none;
  }

  #canvas {
    position: fixed;
    inset: 0;
    touch-action: none;
    cursor: none;
  }

  /* ── Toolbar ────────────────────────────────── */
  #toolbar {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 40px;
    padding: 7px 16px;
    box-shadow: var(--ui-shadow);
    backdrop-filter: blur(14px);
    z-index: 100;
    user-select: none;
    white-space: nowrap;
  }

  .logo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: #111;
    text-transform: uppercase;
    padding-right: 12px;
    border-right: 1px solid var(--ui-border);
  }

  .sep {
    width: 1px; height: 18px;
    background: var(--ui-border);
    flex-shrink: 0;
  }

  /* Color swatch */
  #colorWrap {
    position: relative;
    width: 26px; height: 26px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(0,0,0,0.14);
    cursor: pointer;
    flex-shrink: 0;
  }
  #colorInput {
    position: absolute;
    inset: -8px;
    width: calc(100% + 16px);
    height: calc(100% + 16px);
    border: none; padding: 0;
    cursor: pointer;
  }

  #hexInput {
    width: 74px;
    font-family: var(--font);
    font-size: 11px;
    border: 1px solid var(--ui-border);
    border-radius: 6px;
    padding: 4px 7px;
    background: #f7f7f7;
    color: #222;
    outline: none;
    letter-spacing: 0.04em;
  }
  #hexInput:focus { border-color: #aaa; background: #fff; }

  /* Size slider */
  #sizeSlider {
    -webkit-appearance: none;
    width: 76px; height: 3px;
    background: #e0e0e0;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #sizeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #222;
    cursor: pointer;
    transition: transform 0.1s;
  }
  #sizeSlider::-webkit-slider-thumb:hover { transform: scale(1.3); }

  #sizeLabel {
    font-size: 11px;
    color: #999;
    min-width: 16px;
    text-align: right;
  }

  /* Buttons */
  .tbtn {
    width: 26px; height: 26px;
    border: 1px solid var(--ui-border);
    border-radius: 7px;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.1s, border-color 0.1s;
    color: #555;
    flex-shrink: 0;
  }
  .tbtn:hover { background: #f0f0f0; border-color: #ccc; }
  .tbtn.active { background: #111; color: #fff; border-color: #111; }

  #modeLabel {
    font-size: 10px;
    color: #bbb;
    letter-spacing: 0.07em;
    min-width: 36px;
  }

  /* ── Status bar ──────────────────────────────── */
  #status {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 40px;
    padding: 5px 16px;
    box-shadow: var(--ui-shadow);
    backdrop-filter: blur(14px);
    z-index: 100;
    font-size: 11px;
    color: #999;
    user-select: none;
    white-space: nowrap;
  }
  #status b { color: #444; font-weight: 500; }

  #connDot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ddd;
    transition: background 0.4s;
    flex-shrink: 0;
  }
  #connDot.ok  { background: #2ecc71; }
  #connDot.err { background: #e74c3c; }

  /* ── Remote cursors ──────────────────────────── */
  #cursors {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }
  .rc {
    position: absolute;
    pointer-events: none;
    transform: translate(-2px, -2px);
    transition: left 0.04s linear, top 0.04s linear;
  }
  .rc-label {
    position: absolute;
    top: 17px; left: 9px;
    font-family: var(--font);
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 4px;
    color: #fff;
    white-space: nowrap;
    opacity: 0.82;
  }

  /* ── Local cursor ────────────────────────────── */
  #lc {
    position: fixed;
    pointer-events: none;
    z-index: 200;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    transition: width 0.08s, height 0.08s;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="toolbar">
  <span class="logo">Canverse</span>

  <div id="colorWrap" title="色を選択">
    <input type="color" id="colorInput" value="#111111">
  </div>
  <input type="text" id="hexInput" value="#111111" maxlength="7" spellcheck="false" title="カラーコード">

  <div class="sep"></div>

  <input type="range" id="sizeSlider" min="1" max="60" value="4" title="ペンの太さ">
  <span id="sizeLabel">4</span>

  <div class="sep"></div>

  <button class="tbtn active" id="penBtn"    title="ペン [P]">✏</button>
  <button class="tbtn"        id="eraserBtn" title="消しゴム [E]">◻</button>
  <span id="modeLabel">pen</span>
</div>

<div id="status">
  <div id="connDot"></div>
  <span id="connLabel">接続中...</span>
  <div class="sep" style="height:11px"></div>
  <span>👥 <b id="userCount">0</b></span>
  <div class="sep" style="height:11px"></div>
  <span>x <b id="cx">0</b>  y <b id="cy">0</b></span>
  <div class="sep" style="height:11px"></div>
  <span>zoom <b id="zl">100</b>%</span>
</div>

<div id="cursors"></div>
<div id="lc" style="width:8px;height:8px;background:#111;"></div>
<canvas id="canvas"></canvas>

<script>
// ════════════════════════════════════════════════
//  CANVERSE  —  infinite collaborative canvas
// ════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// ── Viewport ─────────────────────────────────────
let vpX = 0, vpY = 0, zoom = 1;
const MIN_ZOOM = 0.02, MAX_ZOOM = 20;

// ── World bounds (effectively infinite) ──────────
const WORLD_HALF = 500_000;   // ±500 000 px

// ── Drawing state ─────────────────────────────────
let isDrawing = false;
let lastWX = 0, lastWY = 0;
let penColor = '#111111';
let penSize  = 4;
let mode = 'pen';
let myId = null;

// ── WebSocket ─────────────────────────────────────
let ws = null, wsReady = false;
const pending = [];

// ── Strokes store ─────────────────────────────────
const strokes = [];

// ── Remote cursors ────────────────────────────────
const rc = {};

// ═══════════════════════
//  Resize
// ═══════════════════════
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  redraw();
}
window.addEventListener('resize', resize);

// ═══════════════════════
//  Coords
// ═══════════════════════
function s2w(sx, sy) {
  return {
    x: (sx - canvas.width  / 2) / zoom + vpX,
    y: (sy - canvas.height / 2) / zoom + vpY,
  };
}
function w2s(wx, wy) {
  return {
    x: (wx - vpX) * zoom + canvas.width  / 2,
    y: (wy - vpY) * zoom + canvas.height / 2,
  };
}

// ═══════════════════════
//  Grid
// ═══════════════════════
function drawGrid() {
  // Only show grid when zoomed in enough
  if (zoom < 0.15) return;

  // Choose a grid step that stays between ~40–120 px on screen
  const rawStep = 100 / zoom;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  let step;
  if (norm < 2)       step = mag;
  else if (norm < 5)  step = 2 * mag;
  else                step = 5 * mag;

  const screenStep = step * zoom;

  // World coords of visible corners
  const tl = s2w(0, 0);
  const br = s2w(canvas.width, canvas.height);

  const x0 = Math.floor(tl.x / step) * step;
  const y0 = Math.floor(tl.y / step) * step;

  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.045)';
  ctx.lineWidth   = 1;
  ctx.setLineDash([]);

  for (let wx = x0; wx <= br.x + step; wx += step) {
    const sx = Math.round((wx - vpX) * zoom + canvas.width / 2) + 0.5;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, canvas.height); ctx.stroke();
  }
  for (let wy = y0; wy <= br.y + step; wy += step) {
    const sy = Math.round((wy - vpY) * zoom + canvas.height / 2) + 0.5;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(canvas.width, sy); ctx.stroke();
  }

  // Origin cross
  const o = w2s(0, 0);
  ctx.strokeStyle = 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(o.x - 10, o.y); ctx.lineTo(o.x + 10, o.y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(o.x, o.y - 10); ctx.lineTo(o.x, o.y + 10); ctx.stroke();

  ctx.restore();
}

// ═══════════════════════
//  Redraw full scene
// ═══════════════════════
function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();

  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-vpX, -vpY);

  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  for (const s of strokes) {
    ctx.beginPath();
    ctx.strokeStyle = s.color;
    ctx.lineWidth   = s.size;
    ctx.moveTo(s.x0, s.y0);
    ctx.lineTo(s.x1, s.y1);
    ctx.stroke();
  }

  ctx.restore();
}

// ═══════════════════════
//  Incremental draw
// ═══════════════════════
function paintStroke(s) {
  ctx.save();
  ctx.translate(canvas.width / 2, canvas.height / 2);
  ctx.scale(zoom, zoom);
  ctx.translate(-vpX, -vpY);
  ctx.beginPath();
  ctx.strokeStyle = s.color;
  ctx.lineWidth   = s.size;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.moveTo(s.x0, s.y0);
  ctx.lineTo(s.x1, s.y1);
  ctx.stroke();
  ctx.restore();
}

function addStroke(s) {
  strokes.push(s);
  paintStroke(s);
}

// ═══════════════════════
//  Remote cursors
// ═══════════════════════
function upsertRC(id, color, wx, wy) {
  if (id === myId) return;
  let e = rc[id];
  if (!e) {
    const el = document.createElement('div');
    el.className = 'rc';
    el.innerHTML =
      `<svg width="16" height="18" viewBox="0 0 16 18">
         <path d="M2 2 L2 14 L5.5 10.5 L8.5 16.5 L10.5 15.5 L7.5 9.5 L13 9.5 Z"
               fill="${color}" stroke="#fff" stroke-width="1.2"/>
       </svg>
       <div class="rc-label" style="background:${color}">${id}</div>`;
    document.getElementById('cursors').appendChild(el);
    e = rc[id] = { el, wx: 0, wy: 0 };
  }
  e.wx = wx; e.wy = wy;
  moveRC(e);
}

function moveRC(e) {
  const s = w2s(e.wx, e.wy);
  e.el.style.left = s.x + 'px';
  e.el.style.top  = s.y + 'px';
}

function removeRC(id) {
  if (rc[id]) { rc[id].el.remove(); delete rc[id]; }
}

function refreshAllRC() {
  for (const e of Object.values(rc)) moveRC(e);
}

// ═══════════════════════
//  WebSocket
// ═══════════════════════
const WS_URL = `ws://${location.host}`;

function connect() {
  setConn('connecting');
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => { wsReady = true;  setConn('ok'); pending.forEach(m => ws.send(JSON.stringify(m))); pending.length = 0; };
  ws.onclose = () => { wsReady = false; setConn('err'); setTimeout(connect, 2500); };
  ws.onerror = () => { wsReady = false; setConn('err'); };
  ws.onmessage = e => handle(JSON.parse(e.data));
}

function send(obj) {
  if (wsReady && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  else if (obj.type === 'draw') pending.push(obj);
}

function handle(msg) {
  switch (msg.type) {
    case 'init':
      myId = msg.userId;
      strokes.length = 0;
      for (const s of (msg.history || [])) strokes.push(s);
      redraw();
      for (const u of (msg.users || [])) upsertRC(u.id, u.color, u.x, u.y);
      break;
    case 'draw':
      addStroke({ color: msg.color, size: msg.size, x0: msg.x0, y0: msg.y0, x1: msg.x1, y1: msg.y1 });
      break;
    case 'cursor':
      upsertRC(msg.userId, msg.color, msg.x, msg.y);
      break;
    case 'user_left':
      removeRC(msg.userId);
      break;
    case 'user_count':
      document.getElementById('userCount').textContent = msg.count;
      break;
  }
}

function setConn(state) {
  const dot = document.getElementById('connDot');
  const lbl = document.getElementById('connLabel');
  dot.className = state === 'ok' ? 'ok' : state === 'err' ? 'err' : '';
  lbl.textContent = state === 'ok' ? '接続済み' : state === 'err' ? '再接続中...' : '接続中...';
}

// ═══════════════════════
//  Pointer — draw
// ═══════════════════════
let lastCursorT = 0;

function ptrWorld(e) {
  const r = canvas.getBoundingClientRect();
  return s2w(e.clientX - r.left, e.clientY - r.top);
}

function maybeCursor(wx, wy) {
  const now = Date.now();
  if (now - lastCursorT < 30) return;
  lastCursorT = now;
  send({ type: 'cursor', x: wx, y: wy });
}

canvas.addEventListener('pointerdown', e => {
  if (isPanning || e.button !== 0) return;
  canvas.setPointerCapture(e.pointerId);
  isDrawing = true;
  const w = ptrWorld(e); lastWX = w.x; lastWY = w.y;
});

canvas.addEventListener('pointermove', e => {
  const w = ptrWorld(e);
  const lc = document.getElementById('lc');
  lc.style.left = e.clientX + 'px';
  lc.style.top  = e.clientY + 'px';
  document.getElementById('cx').textContent = Math.round(w.x);
  document.getElementById('cy').textContent = Math.round(w.y);
  maybeCursor(w.x, w.y);
  if (!isDrawing) return;

  const color = mode === 'eraser' ? '#ffffff' : penColor;
  const size  = mode === 'eraser' ? penSize * 4 : penSize;
  const s = { color, size, x0: lastWX, y0: lastWY, x1: w.x, y1: w.y };
  addStroke(s);
  send({ type: 'draw', color, size, x0: lastWX, y0: lastWY, x1: w.x, y1: w.y });
  lastWX = w.x; lastWY = w.y;
});

canvas.addEventListener('pointerup',    () => { isDrawing = false; });
canvas.addEventListener('pointerleave', () => { isDrawing = false; });

// ═══════════════════════
//  Pan
// ═══════════════════════
let isPanning = false, panSX = 0, panSY = 0, panVX = 0, panVY = 0, spaceDown = false;

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) { spaceDown = true; canvas.style.cursor = 'grab'; }
  if (e.code === 'KeyP') setMode('pen');
  if (e.code === 'KeyE') setMode('eraser');
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; canvas.style.cursor = 'none'; isPanning = false; }
});

canvas.addEventListener('pointerdown', e => {
  if (e.button === 1 || (e.button === 0 && spaceDown)) {
    isPanning = true; isDrawing = false;
    panSX = e.clientX; panSY = e.clientY;
    panVX = vpX; panVY = vpY;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  }
});
canvas.addEventListener('pointermove', e => {
  if (!isPanning) return;
  vpX = panVX - (e.clientX - panSX) / zoom;
  vpY = panVY - (e.clientY - panSY) / zoom;
  redraw(); refreshAllRC();
});
canvas.addEventListener('pointerup', () => {
  if (isPanning) { isPanning = false; canvas.style.cursor = spaceDown ? 'grab' : 'none'; }
});

// ═══════════════════════
//  Zoom
// ═══════════════════════
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const r  = canvas.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const wB = s2w(sx, sy);
  const f  = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * f));
  const wA = s2w(sx, sy);
  vpX += wB.x - wA.x;
  vpY += wB.y - wA.y;
  document.getElementById('zl').textContent = Math.round(zoom * 100);
  redraw(); refreshAllRC(); updateLC();
}, { passive: false });

// ═══════════════════════
//  Toolbar
// ═══════════════════════
const colorInput = document.getElementById('colorInput');
const hexInput   = document.getElementById('hexInput');
const sizeSlider = document.getElementById('sizeSlider');
const sizeLabel  = document.getElementById('sizeLabel');
const penBtn     = document.getElementById('penBtn');
const eraserBtn  = document.getElementById('eraserBtn');

colorInput.addEventListener('input', () => {
  penColor = colorInput.value;
  hexInput.value = penColor;
  updateLC();
});

hexInput.addEventListener('input', () => {
  const v = hexInput.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(v)) { penColor = v; colorInput.value = v; updateLC(); }
});
hexInput.addEventListener('keydown', e => e.stopPropagation());

sizeSlider.addEventListener('input', () => {
  penSize = parseInt(sizeSlider.value);
  sizeLabel.textContent = penSize;
  updateLC();
});

penBtn.addEventListener('click',    () => setMode('pen'));
eraserBtn.addEventListener('click', () => setMode('eraser'));

function setMode(m) {
  mode = m;
  penBtn.classList.toggle('active',    m === 'pen');
  eraserBtn.classList.toggle('active', m === 'eraser');
  document.getElementById('modeLabel').textContent = m;
  updateLC();
}

function updateLC() {
  const lc = document.getElementById('lc');
  const sz = mode === 'eraser' ? penSize * 4 : penSize;
  const s  = Math.max(6, sz * zoom);
  lc.style.width   = s + 'px';
  lc.style.height  = s + 'px';
  if (mode === 'eraser') {
    lc.style.background = 'rgba(180,180,180,0.18)';
    lc.style.border     = '1.5px solid #bbb';
  } else {
    lc.style.background = penColor;
    lc.style.border     = 'none';
  }
}

document.addEventListener('mousemove', e => {
  const lc = document.getElementById('lc');
  lc.style.left = e.clientX + 'px';
  lc.style.top  = e.clientY + 'px';
});

// ═══════════════════════
//  Boot
// ═══════════════════════
resize();
updateLC();
connect();
document.getElementById('zl').textContent = Math.round(zoom * 100);
</script>
</body>
</html>
