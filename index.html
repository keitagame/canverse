<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>canverse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --border: #2a2a2e;
      --text: #e8e8ea;
      --muted: #6b6b72;
      --accent: #c8f542;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
    }

    /* ── CANVAS ── */
    #canvas-wrap {
      position: fixed;
      inset: 0;
      background: #f5f0e8;
      cursor: crosshair;
    }

    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    /* ── REMOTE CURSORS ── */
    .remote-cursor {
      position: fixed;
      pointer-events: none;
      z-index: 100;
      transform: translate(-4px, -4px);
      transition: transform 0.05s linear;
    }
    .remote-cursor svg { display: block; }
    .remote-cursor-label {
      position: absolute;
      top: 18px;
      left: 8px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      padding: 2px 6px;
      border-radius: 3px;
      white-space: nowrap;
      color: #fff;
      font-weight: 500;
    }

    /* ── HEADER BAR ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 200;
    }

    #logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
      color: var(--accent);
      flex-shrink: 0;
    }

    #room-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      user-select: all;
      transition: border-color 0.15s;
      letter-spacing: 0.5px;
    }
    #room-badge:hover { border-color: var(--accent); color: var(--accent); }

    .sep { flex: 1; }

    /* ── USERS ── */
    #users-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .user-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      border: 2px solid var(--bg);
      transition: transform 0.2s;
      font-family: 'Syne', sans-serif;
      cursor: default;
      position: relative;
    }
    .user-dot:hover { transform: scale(1.2); z-index: 1; }

    /* ── TOOLBAR ── */
    #toolbar {
      position: fixed;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 200;
    }

    .tool-btn {
      width: 36px; height: 36px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      font-size: 16px;
    }
    .tool-btn:hover { background: var(--surface); color: var(--text); }
    .tool-btn.active { background: var(--accent); color: #0e0e0f; }

    .tool-sep {
      width: 20px;
      height: 1px;
      background: var(--border);
      margin: 2px auto;
    }

    /* size slider */
    #size-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }
    #size-val {
      font-size: 9px;
      color: var(--muted);
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 4px;
      height: 80px;
      writing-mode: vertical-lr;
      direction: rtl;
      background: var(--border);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── BOTTOM BAR ── */
    #bottom-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 200;
      font-size: 11px;
      color: var(--muted);
    }

    #my-color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }
    #status-dot.disconnected { background: #f44336; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── JOIN MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(14,14,15,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 36px 32px;
      width: 360px;
      max-width: 90vw;
    }

    #modal h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      color: var(--accent);
      margin-bottom: 6px;
      letter-spacing: -1px;
    }
    #modal p {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 14px;
    }
    .input-group label {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .input-group input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--accent); }

    #join-btn {
      width: 100%;
      margin-top: 8px;
      background: var(--accent);
      color: #0e0e0f;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    #join-btn:hover { opacity: 0.88; }

    /* ── NOTIFICATIONS ── */
    #notifs {
      position: fixed;
      bottom: 60px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 300;
      pointer-events: none;
    }
    .notif {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 11px;
      color: var(--text);
      opacity: 0;
      transform: translateX(20px);
      animation: notif-in 0.3s forwards, notif-out 0.3s 2.7s forwards;
    }
    @keyframes notif-in {
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes notif-out {
      to { opacity: 0; transform: translateX(20px); }
    }

    /* ── CANVAS AREA OFFSET ── */
    #canvas-wrap { top: 52px; }
  </style>
</head>
<body>

<!-- JOIN MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <h1>canverse</h1>
    <p>リアルタイム協調ホワイトボード</p>
    <div class="input-group">
      <label>あなたの名前</label>
      <input id="input-name" type="text" placeholder="名前を入力..." maxlength="20">
    </div>
    <div class="input-group">
      <label>ルームID（空白で新規作成）</label>
      <input id="input-room" type="text" placeholder="例: my-room-123" maxlength="30">
    </div>
    <button id="join-btn">参加する →</button>
  </div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="logo">canverse</div>
  <div id="room-badge" title="クリックでコピー">---</div>
  <div class="sep"></div>
  <div id="users-row"></div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn active" data-tool="pen" title="ペン">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
  </button>
  <button class="tool-btn" data-tool="marker" title="マーカー">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17l4-4 10-10 3 3L10 16l-4 4-3-3z"/><path d="M14 6l4 4"/></svg>
  </button>
  <button class="tool-btn" data-tool="eraser" title="消しゴム">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-3 3z"/><path d="M6.26 6.26L3 9.5l5 5"/></svg>
  </button>
  <div class="tool-sep"></div>
  <div id="size-wrap">
    <span id="size-val">15</span>
    <input type="range" id="size-slider" min="2" max="60" value="15">
  </div>
  <div class="tool-sep"></div>
  <button class="tool-btn" id="undo-btn" title="元に戻す (Ctrl+Z)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
  </button>
  <button class="tool-btn" id="clear-btn" title="全て消去">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
  </button>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<!-- REMOTE CURSORS CONTAINER -->
<div id="cursors-layer"></div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <div id="status-dot" class="disconnected"></div>
  <span id="status-text">切断中</span>
  <span style="color:var(--border)">|</span>
  <div id="my-color-dot"></div>
  <span id="my-name-label">---</span>
</div>

<!-- NOTIFICATIONS -->
<div id="notifs"></div>

<script>
/* ─── UTILS ─── */
function randomId(len = 8) {
  return Math.random().toString(36).slice(2, 2+len);
}
function notify(msg) {
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  document.getElementById('notifs').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

/* ─── STATE ─── */
let ws = null;
let myUserId = null;
let myColor = '#000';
let myName = '';
let roomId = '';
let currentTool = 'pen';
let brushSize = 15;
let drawing = false;
let lastX = 0, lastY = 0;
let currentStrokePoints = [];
let strokeFlushTimer = null;
const FIXED_ANGLE = Math.PI / 4;

/* ─── CANVAS ─── */
const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);
  redrawAll();
}
window.addEventListener('resize', resizeCanvas);

/* ─── DRAWING HISTORY (local mirror) ─── */
let strokeHistory = [];

function redrawAll(history) {
  if (history) strokeHistory = history;
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  for (const s of strokeHistory) {
    renderStroke(s);
  }
}

function renderStroke(s) {
  const pts = s.points;
  if (!pts || pts.length < 2) return;
  const color = s.color || '#000';
  const size = s.size || 15;
  const tool = s.tool || 'pen';

  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
  } else {
    ctx.globalCompositeOperation = 'source-over';
  }

  if (tool === 'marker') {
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = color;
    ctx.lineWidth = size * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      ctx.lineTo(pts[i].x, pts[i].y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    // pen / eraser: rect brush stamped along path
    for (let i = 1; i < pts.length; i++) {
      const x1 = pts[i-1].x, y1 = pts[i-1].y;
      const x2 = pts[i].x, y2 = pts[i].y;
      drawRectSegment(x1, y1, x2, y2, color, size, tool === 'eraser');
    }
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

function drawRectSegment(x1, y1, x2, y2, color, size, eraser) {
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.hypot(dx, dy);
  const steps = Math.max(1, Math.ceil(dist / 2));
  const w = size, h = Math.max(2, size / 3);

  for (let i = 0; i < steps; i++) {
    const t = i / steps;
    const x = x1 + dx * t;
    const y = y1 + dy * t;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(FIXED_ANGLE);
    if (eraser) {
      ctx.fillStyle = 'rgba(255,255,255,1)';
    } else {
      ctx.fillStyle = color;
    }
    ctx.fillRect(-w/2, -h/2, w, h);
    ctx.restore();
  }
}

/* ─── LOCAL DRAWING ─── */
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  drawing = true;
  const {x, y} = getPos(e);
  lastX = x; lastY = y;
  currentStrokePoints = [{x, y}];
}

function moveDraw(e) {
  // send cursor
  const {x, y} = getPos(e);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'cursor', x, y }));
  }
  if (!drawing) return;

  // local preview
  const tool = currentTool;
  const size = brushSize;

  if (tool === 'marker') {
    ctx.globalAlpha = 0.35;
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = myColor;
    ctx.lineWidth = size * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else {
    if (tool === 'eraser') ctx.globalCompositeOperation = 'destination-out';
    drawRectSegment(lastX, lastY, x, y, myColor, size, tool === 'eraser');
    ctx.globalCompositeOperation = 'source-over';
  }

  currentStrokePoints.push({x, y});
  lastX = x; lastY = y;

  // flush stroke points periodically
  clearTimeout(strokeFlushTimer);
  if (currentStrokePoints.length >= 8) flushStroke(false);
  else strokeFlushTimer = setTimeout(() => flushStroke(false), 30);
}

function endDraw() {
  if (!drawing) return;
  drawing = false;
  flushStroke(true);
}

function flushStroke(final) {
  if (currentStrokePoints.length < 2) {
    if (final) currentStrokePoints = [];
    return;
  }
  const pts = currentStrokePoints.slice();
  if (final) currentStrokePoints = [];
  else currentStrokePoints = [pts[pts.length - 1]];

  if (ws && ws.readyState === 1) {
    const msg = {
      type: 'stroke',
      points: pts,
      tool: currentTool,
      size: brushSize,
    };
    ws.send(JSON.stringify(msg));
    // add to local history
    strokeHistory.push({
      type: 'stroke',
      userId: myUserId,
      color: myColor,
      points: pts,
      tool: currentTool,
      size: brushSize,
    });
  }
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startDraw(e); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDraw(e); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); endDraw(); });

/* ─── REMOTE CURSORS ─── */
const cursorLayer = document.getElementById('cursors-layer');
const remoteCursors = {};

function updateCursor(userId, x, y, name, color) {
  let el = remoteCursors[userId];
  if (!el) {
    el = document.createElement('div');
    el.className = 'remote-cursor';
    el.innerHTML = `
      <svg width="16" height="20" viewBox="0 0 16 20" fill="${color}">
        <path d="M0 0 L0 16 L4 12 L7 18 L9 17 L6 11 L11 11 Z" fill="${color}" stroke="#fff" stroke-width="1"/>
      </svg>
      <div class="remote-cursor-label" style="background:${color}">${name}</div>
    `;
    cursorLayer.appendChild(el);
    remoteCursors[userId] = el;
  }
  // offset for header
  el.style.left = x + 'px';
  el.style.top = (y + 52) + 'px';
}

function removeCursor(userId) {
  if (remoteCursors[userId]) {
    remoteCursors[userId].remove();
    delete remoteCursors[userId];
  }
}

/* ─── USERS UI ─── */
function updateUsersUI(users) {
  const row = document.getElementById('users-row');
  row.innerHTML = '';
  for (const u of users) {
    const dot = document.createElement('div');
    dot.className = 'user-dot';
    dot.style.background = u.color;
    dot.title = u.name;
    dot.textContent = u.name.slice(0,1).toUpperCase();
    row.appendChild(dot);
  }
}

/* ─── WEBSOCKET ─── */
function connect(name, room) {
  myName = name;
  roomId = room;
  myUserId = randomId();
  const host = location.hostname;
  const port = location.port || 8000;
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${host}:${port}/ws/${roomId}/${myUserId}?name=${encodeURIComponent(name)}`;

  ws = new WebSocket(url);

  ws.onopen = () => {
    setStatus(true);
    document.getElementById('room-badge').textContent = roomId;
  };

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    switch (data.type) {
      case 'init':
        myColor = data.color;
        document.getElementById('my-color-dot').style.background = myColor;
        document.getElementById('my-name-label').textContent = myName;
        redrawAll(data.history || []);
        updateUsersUI(data.users || []);
        resizeCanvas();
        break;

      case 'stroke': {
        strokeHistory.push(data);
        renderStroke(data);
        break;
      }

      case 'cursor':
        updateCursor(data.userId, data.x, data.y, data.name, data.color);
        break;

      case 'clear':
        strokeHistory = [];
        const dpr = window.devicePixelRatio || 1;
        ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);
        notify('キャンバスがクリアされました');
        break;

      case 'redraw':
        redrawAll(data.history || []);
        break;

      case 'user_join':
        updateUsersUI(data.users || []);
        notify(`${data.name} が参加しました`);
        break;

      case 'user_leave':
        updateUsersUI(data.users || []);
        removeCursor(data.userId);
        break;
    }
  };

  ws.onclose = () => {
    setStatus(false);
    setTimeout(() => connect(myName, roomId), 3000);
  };
  ws.onerror = () => ws.close();
}

function setStatus(ok) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  if (ok) {
    dot.className = 'status-dot';
    txt.textContent = '接続中';
    dot.style.background = '#4CAF50';
    dot.style.animation = 'pulse 2s infinite';
  } else {
    dot.style.background = '#f44336';
    dot.style.animation = 'none';
    txt.textContent = '再接続中...';
  }
}

/* ─── TOOLBAR ─── */
document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTool = btn.dataset.tool;
    canvas.style.cursor = currentTool === 'eraser' ? 'cell' : 'crosshair';
  });
});

document.getElementById('size-slider').addEventListener('input', e => {
  brushSize = +e.target.value;
  document.getElementById('size-val').textContent = brushSize;
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (!confirm('キャンバスを全て消しますか？')) return;
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'clear' }));
  strokeHistory = [];
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width/dpr, canvas.height/dpr);
});

document.getElementById('undo-btn').addEventListener('click', undo);

function undo() {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'undo' }));
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
});

/* ─── ROOM BADGE: copy ─── */
document.getElementById('room-badge').addEventListener('click', () => {
  const url = `${location.origin}?room=${roomId}`;
  navigator.clipboard.writeText(url).then(() => notify('URLをコピーしました！'));
});

/* ─── JOIN MODAL ─── */
const modal = document.getElementById('modal-overlay');

function getUrlParam(k) {
  return new URLSearchParams(location.search).get(k);
}

document.getElementById('join-btn').addEventListener('click', () => {
  const name = document.getElementById('input-name').value.trim() || `User-${randomId(4)}`;
  const room = document.getElementById('input-room').value.trim() || randomId(6);
  modal.style.display = 'none';
  connect(name, room);
  history.replaceState({}, '', `?room=${room}`);
});

document.getElementById('input-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('join-btn').click();
});
document.getElementById('input-room').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('join-btn').click();
});

// Pre-fill room from URL
const urlRoom = getUrlParam('room');
if (urlRoom) document.getElementById('input-room').value = urlRoom;
document.getElementById('input-name').focus();
</script>
</body>
</html>
